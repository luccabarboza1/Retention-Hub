[www]
user  = www-data
group = www-data

listen = 127.0.0.1:9000

pm                   = dynamic
pm.max_children      = 6
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests      = 500

; Logs para stderr (capturado pelo container runtime)
php_admin_value[error_log]  = /dev/stderr
php_admin_flag[log_errors]  = on
